iarnet:
  provider:
    host: 172.30.23.95

    # Provider 名称（用户自定义，注册时提交给控制平面）
    name: docker-provider-01
    # Provider 描述
    description: "本机 Docker Provider"
    # 引擎类型: docker / k8s
    type: docker
    # 可选：拓扑/区域信息，例如 "edge-a" / "az-1"
    zone: ""
    # control-plane 连接信息（Provider 主动连接，无需暴露本地端口）
    control-plane:
      host: 127.0.0.1
      port: 9090
    # 资源标签
    tags:
      - cpu
      - memory
    # 资源容量配置
    resource:
      cpu: 4.0
      memory: 8Gi
      gpu: 0
    # artifact 存储目录（默认 ~/.iarnet-provider/artifacts）
    # artifact-dir: ~/.iarnet-provider/artifacts

    # ===== Docker 引擎配置 =====
    docker:
      host: unix:///var/run/docker.sock
      network: ""

    # ===== K8s 引擎配置 =====
    k8s:
      kubeconfig: ""
      in-cluster: false
      namespace: default

    # ===== 本地 Actor 连接 =====
    actor-agent:
      port: 10000
