syntax = "proto3";

package iarnet.provider;

import "iarnet/common/function.proto";
import "iarnet/common/resource.proto";

option java_package = "com.kekwy.iarnet.proto.provider";
option java_multiple_files = true;

message DeploymentEnvelope {
  string message_id = 1;
  string correlation_id = 2;

  oneof message {
    DeployActorRequest deploy_actor_request = 3;
    DeployActorResponse deploy_actor_response = 4;
    StopActorRequest stop_actor_request = 5;
    StopActorResponse stop_actor_response = 6;
    RemoveActorRequest remove_actor_request = 7;
    RemoveActorResponse remove_actor_response = 8;
    GetActorStatusRequest get_actor_status_request = 9;
    GetActorStatusResponse get_actor_status_response = 10;
  }

}

message DeployActorRequest {
  string              actor_id      = 1;  // 实例唯一标识（由 control-plane 生成）
  string              artifact_url     = 2;  // artifact 拉取地址（如 OSS 预签名 URL）；Adapter 收到后按需拉取再部署
  iarnet.common.ResourceSpec  resource_request = 3;  // 资源需求
  iarnet.common.Lang      lang             = 4;  // 算子使用的编程语言 / 运行时
  repeated string     upstream_actor_addrs   = 5;  // 上游 Actor 的虚拟地址列表
  repeated string     downstream_actor_addrs = 6;  // 下游 Actor 的虚拟地址列表
  iarnet.common.FunctionDescriptor function_descriptor = 7;  // 该 Actor 要执行的函数描述；Adapter 写入文件并挂载，Actor 启动时读取
}

message DeployActorResponse {
  ActorInfo actor = 1;
}

// ======================== Actor 管理 ========================

message StopActorRequest {
  string actor_id = 1;
}

message StopActorResponse {
  bool   success = 1;
  string message = 2;
}

message RemoveActorRequest {
  string actor_id = 1;
}

message RemoveActorResponse {
  bool   success = 1;
  string message = 2;
}

message GetActorStatusRequest {
  string actor_id = 1;
}

message GetActorStatusResponse {
  ActorInfo actor = 1;
}

// ======================== 通用类型 ========================

// 资源容量：描述设备总资源、已使用、可用
message ResourceCapacity {
  iarnet.common.ResourceSpec total     = 1;
  iarnet.common.ResourceSpec used      = 2;
  iarnet.common.ResourceSpec available = 3;
}

// Actor 信息
message ActorInfo {
  string         actor_id  = 1;
  ActorStatus status       = 2;
  string         message      = 3;  // 状态描述或错误信息
}

enum ActorStatus {
  ACTOR_STATUS_UNSPECIFIED = 0;
  PENDING                    = 1;  // 正在创建
  RUNNING                    = 2;  // 运行中
  STOPPED                    = 3;  // 已停止（可重启）
  FAILED                     = 4;  // 启动或运行失败
  REMOVED                    = 5;  // 已移除
}
