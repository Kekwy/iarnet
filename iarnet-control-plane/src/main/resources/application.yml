server:
  port: 8080

spring:
  datasource:
    url: jdbc:sqlite:./data/iarnet.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false

iarnet:
  supported-lang:
    - java
    - python
    - go
