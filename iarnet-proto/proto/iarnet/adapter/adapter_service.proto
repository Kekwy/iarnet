syntax = "proto3";

package iarnet.adapter;

import "iarnet/ir/common.proto";
import "iarnet/ir/workflow.proto";

option java_package = "com.kekwy.iarnet.proto.adapter";
option java_multiple_files = true;

// ======================== Adapter 消息类型定义 ========================
// 定义 control-plane 与 Adapter 之间的操作请求/响应消息。
// 实际传输通过 adapter_registry.proto 中的 CommandChannel 双向流完成，
// Adapter 无需暴露任何端口。

// ======================== 设备信息 ========================

message GetDeviceInfoRequest {}

message GetDeviceInfoResponse {
  string           adapter_type = 1;  // 适配器类型，如 "docker", "k8s", "process"
  string           os_arch      = 2;  // 操作系统与架构，如 "linux/amd64"
  ResourceCapacity capacity     = 3;  // 设备资源容量
  repeated string  tags         = 4;  // 资源标签，如 ["cpu", "gpu", "camera"]
}

// ======================== Artifact 传输 ========================

message TransferArtifactChunk {
  string artifact_id = 1;  // artifact 唯一标识（首个 chunk 必须设置，后续可省略）
  string file_name   = 2;  // 文件名提示（首个 chunk 设置，如 "app.jar"）
  bytes  data        = 3;  // 文件分块字节
  bool   last_chunk  = 4;  // 是否为最后一个分块（收到后 Adapter 完成存储并返回响应）
}

message TransferArtifactResponse {
  string artifact_id   = 1;
  string artifact_path = 2;  // 在设备上的存储路径
}

// ======================== 实例部署 ========================

message DeployInstanceRequest {
  string              instance_id      = 1;  // 实例唯一标识（由 control-plane 生成）
  string              artifact_id      = 2;  // artifact 标识，用于本地缓存去重与目录命名
  string              artifact_url     = 3;  // artifact 拉取地址（如 OSS 预签名 URL）；Adapter 收到后按需拉取再部署
  iarnet.ir.Resource  resource_request = 4;  // 资源需求
  map<string, string> env_vars         = 5;  // 环境变量
  map<string, string> labels           = 6;  // 实例标签（便于管理和查询）
  iarnet.ir.Lang      lang             = 7;  // 算子使用的编程语言 / 运行时
  repeated string     upstream_actor_addrs   = 8;  // 上游 Actor 的虚拟地址列表
  repeated string     downstream_actor_addrs = 9;  // 下游 Actor 的虚拟地址列表
  iarnet.ir.FunctionDescriptor function_descriptor = 10;  // 该 Actor 要执行的函数描述；Adapter 写入文件并挂载，Actor 启动时读取
}

message DeployInstanceResponse {
  InstanceInfo instance = 1;
}

// ======================== 实例管理 ========================

message StopInstanceRequest {
  string instance_id = 1;
}

message StopInstanceResponse {
  bool   success = 1;
  string message = 2;
}

message RemoveInstanceRequest {
  string instance_id = 1;
}

message RemoveInstanceResponse {
  bool   success = 1;
  string message = 2;
}

message GetInstanceStatusRequest {
  string instance_id = 1;
}

message GetInstanceStatusResponse {
  InstanceInfo instance = 1;
}

// ======================== 资源使用 ========================

message GetResourceUsageRequest {}

message GetResourceUsageResponse {
  ResourceCapacity capacity = 1;
}

// ======================== 网络候选（ICE 预留） ========================

message GetNetworkCandidatesRequest {
  string instance_id = 1;  // 目标实例（可选，为空则返回设备级别候选）
}

message GetNetworkCandidatesResponse {
  repeated NetworkCandidate candidates = 1;
}

message NetworkCandidate {
  CandidateType type     = 1;
  string        host     = 2;
  int32         port     = 3;
  int32         priority = 4;  // 优先级，越高越优先
}

enum CandidateType {
  CANDIDATE_TYPE_UNSPECIFIED = 0;
  DIRECT                    = 1;  // 直连地址（局域网内可达）
  NAT_MAPPED                = 2;  // NAT 映射地址（经 STUN 探测）
  RELAY                     = 3;  // 中继地址（fallback）
}

// ======================== 通用类型 ========================

// 资源容量：描述设备总资源、已使用、可用
message ResourceCapacity {
  iarnet.ir.Resource total     = 1;
  iarnet.ir.Resource used      = 2;
  iarnet.ir.Resource available = 3;
}

// 实例信息
message InstanceInfo {
  string         instance_id  = 1;
  string         container_id = 2;  // 容器/Pod ID（运行时标识）
  string         host         = 3;  // 实例可达的主机地址
  int32          port         = 4;  // 实例监听的端口
  InstanceStatus status       = 5;
  string         message      = 6;  // 状态描述或错误信息
}

enum InstanceStatus {
  INSTANCE_STATUS_UNSPECIFIED = 0;
  PENDING                    = 1;  // 正在创建
  RUNNING                    = 2;  // 运行中
  STOPPED                    = 3;  // 已停止（可重启）
  FAILED                     = 4;  // 启动或运行失败
  REMOVED                    = 5;  // 已移除
}
