syntax = "proto3";

package iarnet.agent;

import "iarnet/actor/actor_control.proto";
import "iarnet/common/type.proto";
import "iarnet/common/function.proto";

option java_package = "com.kekwy.iarnet.proto.agent";
option java_multiple_files = true;

// ======================== 本地 Device Agent 服务（Actor ↔ DeviceAgent） ========================
// 运行在资源节点上，由 Adapter 进程内嵌，实现 Actor 与本机 Device Agent 之间的本地控制通道。

service LocalAgentService {
  // 基础版：单条双向流，后续在 LocalAgentMessage 中扩展消息类型。
  rpc LocalChannel(stream LocalAgentMessage) returns (stream LocalAgentMessage);
}

message LocalAgentMessage {
  oneof payload {
    LocalRegisterActor register_actor = 1;
    // 服务端 → 客户端：上游 Actor 经 Device Agent 转发的行数据，下游 Actor 可反序列化为 Java 对象
    iarnet.common.Value row_delivery = 2;
    // 服务端 → 客户端：为当前 Actor 分配要执行的函数（来自 IR FunctionDescriptor）
    iarnet.common.FunctionDescriptor assign_function = 3;
    // 服务端 → 客户端：控制平面下发的指令（如 StartSourceDirective），经 Device Agent 转发
    iarnet.actor.ActorDirective actor_directive = 4;

    // 客户端 → 服务端：Actor 产出的行数据，由 Device Agent 转发给下游 Actor
    RowOutput row_output = 5;
    // 服务端 → 客户端：为 Source Actor 分配 constant rows（来自 IR SourceNodeDetail）
    SourceConfig source_config = 6;
  }
}

// Actor 向本机 Device Agent 注册自身监听地址。
message LocalRegisterActor {
  string actor_addr = 1; // 虚拟地址（ActorAddr）
}

// Actor → Device Agent：Actor 产出的一行数据，由 Device Agent 路由转发给所有下游 Actor
message RowOutput {
  iarnet.common.Value row = 1;
}

// Device Agent → Source Actor：下发 constant source 配置（rows + 下游地址列表）
message SourceConfig {
  repeated iarnet.common.Value rows = 1;
}

