syntax = "proto3";

package iarnet.agent;

option java_package = "com.kekwy.iarnet.proto.agent";
option java_multiple_files = true;

// ======================== Device Agent 注册与信令服务 ========================
// 由控制平面实现，每台设备上的 Device Agent 作为客户端主动连接。
//
// 职责：
// - 管理设备注册与心跳（DeviceId 分配）
// - 通过 SignalingChannel 中转 Device Agent 之间的 ICE 信令
// - 下发连接指令（ConnectInstruction），要求两端为指定 Actor 建立通道

service DeviceAgentRegistryService {

  // 设备启动后主动向控制平面注册，获取全局唯一的 device_id。
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse);

  // 周期性心跳，上报基础状态与标签变化等（可按需扩展）。
  rpc Heartbeat(DeviceHeartbeat) returns (DeviceHeartbeatAck);

  // 长连接信令通道：双向流。
  //
  // Device Agent → 控制平面：
  //   - 上报候选地址、网络状态（CandidateUpdate）
  //   - 发送 ICE 信令包（IceEnvelope），由控制平面转发给对端设备
  //
  // 控制平面 → Device Agent：
  //   - 下发 ConnectInstruction，要求为某条 workflow edge 建立 Actor 间通道
  //   - 将来自其他设备的 IceEnvelope 转发给本设备
  rpc SignalingChannel(stream SignalingMessage) returns (stream SignalingMessage);
}

// ======================== 设备注册与心跳 ========================

message RegisterDeviceRequest {
  // 设备名称（可读性标识，例如 hostname 或自定义别名）
  string device_name = 1;

  // 设备描述（可选）
  string description = 2;

  // 设备标签（例如: ["edge", "gpu", "arm"]）
  repeated string tags = 3;

  // 可选：拓扑/区域信息，例如 "edge-a" / "az-1"
  string zone = 4;
}

message RegisterDeviceResponse {
  // 注册是否被接受
  bool   accepted  = 1;

  // 控制平面分配的全局唯一 DeviceId（后续所有信令/心跳需携带）
  string device_id = 2;

  // 附加信息（拒绝原因或提示）
  string message   = 3;
}

message DeviceHeartbeat {
  string device_id    = 1;

  // 纳秒或毫秒时间戳（由 Device Agent 填写）
  int64  timestamp_ms = 2;

  // 设备当前标签快照（可选，便于动态变更标签）
  repeated string tags = 3;
}

message DeviceHeartbeatAck {
  bool acknowledged = 1;
}

// ======================== 信令通道消息 ========================

message SignalingMessage {
  // 发送方设备 ID
  string device_id    = 1;

  // 发送时间（毫秒时间戳）
  int64  timestamp_ms = 2;

  oneof payload {
    // 控制平面 → DeviceAgent：建立通道指令
    ConnectInstruction connect_instruction = 10;

    // DeviceAgent ↔ DeviceAgent（经控制平面中转）的 ICE 信令包
    IceEnvelope        ice_envelope        = 11;

    // DeviceAgent → 控制平面：上报本机可用候选地址信息
    CandidateUpdate    candidate_update    = 12;

    // DeviceAgent → 控制平面：上报本机某条 Actor 通道的连接状态
    ActorChannelStatus actor_channel       = 13;
  }
}

// 由 Device Agent 上报某条 Actor 间通道的状态
message ActorChannelStatus {
  string workflow_id     = 1;
  string application_id  = 2;
  string src_actor_addr  = 3;
  string dst_actor_addr  = 4;
  bool   connected       = 5; // true 表示该方向的通道已建立
}

// 控制平面下发的“建立连接”指令。
message ConnectInstruction {
  // 本次连接协商的唯一标识，用于在多次重试/候选交换中进行关联。
  string connect_id = 1;

  // 源 Actor 与目标 Actor 的虚拟地址（逻辑标识）
  string src_actor_addr = 2;
  string dst_actor_addr = 3;

  // 连接角色：true 表示本设备作为“主动发起方”（caller），false 为“被动应答方”（callee）。
  bool   initiator      = 4;
}

// ICE 信令包，通过控制平面在设备之间中转。
message IceEnvelope {
  string connect_id    = 1;

  // 源设备 / 目标设备
  string from_device_id = 2;
  string to_device_id   = 3;

  // 信令类型（例如: "offer" / "answer" / "candidate" / 自定义）
  string signal_type    = 4;

  // 具体信令负载（SDP / candidate JSON / 自定义编码）
  bytes  signal_payload = 5;
}

// 设备上报本机可用的网络候选信息（可选，用于控制平面构建全局视图）。
message CandidateUpdate {
  string device_id = 1;

  repeated NetworkCandidate candidates = 2;
}

// 简化版网络候选，后续可扩展 STUN/TURN/优先级等字段。
message NetworkCandidate {
  enum CandidateType {
    CANDIDATE_TYPE_UNSPECIFIED = 0;
    DIRECT                     = 1; // 局域网直连地址
    NAT_MAPPED                 = 2; // NAT 映射地址（经 STUN 探测）
    RELAY                      = 3; // 中继地址（TURN / 中转服务器）
  }

  CandidateType type = 1;

  // 网络层地址信息
  string host = 2;
  int32  port = 3;

  // 候选优先级，越大越优先
  int32  priority = 4;
}

