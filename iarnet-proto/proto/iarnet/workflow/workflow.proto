syntax = "proto3";

package iarnet.workflow;

import "iarnet/common/function.proto";
import "iarnet/common/resource.proto";

option java_package = "com.kekwy.iarnet.proto.workflow";
option java_multiple_files = true;

// ======================== 工作流图（顶层） ========================

message WorkflowGraph {
  string   workflow_id      = 1;
  string   application_id   = 2;
  string   name             = 3;
  repeated Node nodes       = 4;
  repeated Edge edges       = 5;
}

// ======================== 边 ========================

message Edge {
  string   from_node_id = 1;
  string   to_node_id   = 2;
  optional common.FunctionDescriptor conditionFunction      = 3;
}

// ======================== 节点 ========================

message Node {
  string   id          = 1;
  string  name = 2;
  common.FunctionDescriptor function      = 3;
  NodeConfig nodeConfig = 4;
}

message NodeConfig {
  int32               replicas      = 1;
  common.ResourceSpec resource_spec      = 2;
}
