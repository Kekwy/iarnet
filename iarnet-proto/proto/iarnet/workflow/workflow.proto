syntax = "proto3";

package iarnet.workflow;

import "iarnet/common/function.proto";
import "iarnet/common/resource.proto";
import "iarnet/common/type.proto";

option java_package = "com.kekwy.iarnet.proto.workflow";
option java_multiple_files = true;

// ======================== 工作流图（顶层） ========================

message WorkflowGraph {
  string   workflow_id      = 1;
  string   application_id   = 2;
  repeated Node nodes       = 3;
  repeated Edge edges       = 4;
}



// ======================== 边 ========================

message Edge {
  string from_node_id = 1;
  string to_node_id   = 2;
  int32  from_port    = 3;  // 0 = 主输出（默认），1 = branch 的 unmatched 输出
}

// ======================== 节点 ========================

enum NodeKind {
  NODE_KIND_UNSPECIFIED = 0;
  SOURCE                = 1;
  OPERATOR              = 2;
  SINK                  = 3;
}

message Node {
  string   id          = 1;
  NodeKind kind        = 2;
  common.Type     input_type  = 3;
  common.Type     output_type = 4;
  common.FunctionDescriptor function      = 5;
  int32              replicas      = 6;
  common.Resource           resource      = 7;

  // 根据 kind 使用对应的 detail
  oneof detail {
    SourceNodeDetail   source_detail   = 8;
    OperatorNodeDetail operator_detail = 9;
    SinkNodeDetail     sink_detail     = 10;
  }
}

// ======================== Source 节点 ========================

enum SourceKind {
  SOURCE_KIND_UNSPECIFIED = 0;
  CONSTANT                = 1;
  FILE                    = 2;
}

message SourceNodeDetail {
  SourceKind source_kind = 1;
  oneof detail {
    ConstantSourceDetail constant_source_detail = 2;
    FileSourceDetail file_source_detail = 3;
  }
}

message ConstantSourceDetail {
  repeated common.Value values = 1;
}

message FileSourceDetail {
  string file_path = 1;
}

// ======================== Operator 节点 ========================

enum OperatorKind {
  OPERATOR_KIND_UNSPECIFIED = 0;
  OPERATOR_MAP              = 1;
  OPERATOR_FLAT_MAP         = 2;
  OPERATOR_FILTER           = 3;
  OPERATOR_UNION            = 4;
  OPERATOR_KEY_BY           = 5;
  OPERATOR_CORRELATE        = 6;
  OPERATOR_FOLD             = 7;
  OPERATOR_BATCH            = 8;
  OPERATOR_BRANCH           = 9;
}

message WindowSpec {
  enum WindowKind {
    WINDOW_KIND_UNSPECIFIED = 0;
    WINDOW_KIND_INTERVAL    = 1;
  }
  WindowKind kind     = 1;
  int64 lower_bound_ms = 2;
  int64 upper_bound_ms = 3;
}

message OperatorNodeDetail {
  OperatorKind operator_kind = 1;
  // KEY_BY / CORRELATE 专用：key 提取函数
  common.FunctionDescriptor key_selector = 2;
  // BATCH 专用：每批元素数量
  int32 batch_size = 3;
  // FOLD 专用：累加器初始值
  common.Value fold_initial_value = 4;
  WindowSpec window = 5;
}

// ======================== Sink 节点 ========================

enum SinkKind {
  SINK_KIND_UNSPECIFIED = 0;
  PRINT                 = 1;
}

message SinkNodeDetail {
  SinkKind sink_kind = 1;
}
