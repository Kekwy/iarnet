syntax = "proto3";

package iarnet.proto.ir;

option java_multiple_files = true;
option java_package = "com.kekwy.iarnet.proto.ir";
option java_outer_classname = "WorkflowProto";

// 顶层工作流描述，一次执行请求可以包含多条管道。
message Workflow {
  repeated Pipeline pipelines = 1;
}

// 一条完整管道：source -> stages* -> [task] -> sink
message Pipeline {
  // 业务侧可选的标识，例如由客户端生成
  string id = 1;

  Source source = 2;
  repeated Stage stages = 3;

  // 可选的 checkpoint / 任务节点
  Task task = 4;

  Sink sink = 5;
}

// 数据源描述，对应 DSL 中的 Source 实现（FileSource、ConstantSource 等）
message Source {
  // 逻辑 ID，用于在后端做缓存或复用（可选）
  string id = 1;

  oneof kind {
    FileSource file = 2;
    ConstantSource constant = 3;
  }
}

// 从文件按行读取的 Source
message FileSource {
  string path = 1;
}

// 常量数据源（例如用于测试或调试）
message ConstantSource {
  // 简化起见，先按字符串表示，后续可以扩展为通用 Value 类型
  repeated string values = 1;
}

// 流上的一个处理阶段（map / filter / flatMap）
message Stage {
  string id = 1;

  oneof kind {
    MapStage map = 2;
    FilterStage filter = 3;
    FlatMapStage flat_map = 4;
  }
}

// map：一对一映射
message MapStage {
  // 后端可识别的函数标识（例如注解标记的函数名、资源名等）
  string function = 1;
}

// filter：过滤
message FilterStage {
  string function = 1;
}

// flatMap：一对多映射
message FlatMapStage {
  string function = 1;
}

// 任务节点（例如 checkpoint），对应 DSL 中的 Task
message Task {
  string name = 1;
  // 执行逻辑的标识，同样由后端解析
  string function = 2;
}

// 数据汇（sink），目前只定义 PrintSink，后续可扩展为资源型 sink 等
message Sink {
  string id = 1;

  oneof kind {
    PrintSink print = 2;
  }
}

// 将数据打印到标准输出
message PrintSink {
}

